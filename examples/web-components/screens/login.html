<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blueprint Web Components Example</title>
    <script type="module" src="./login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @custom-variant dark (&:where(.dark, .dark *));
    </style>
  </head>
  <body class="min-h-screen bg-linear-to-b from-blue-50 to-zinc-100 px-4 py-12 text-zinc-900 dark:from-zinc-950 dark:to-zinc-950 dark:text-zinc-50">
    <div class="mx-auto w-full max-w-5xl">
      <bp-page-shell
        title="로그인"
        description="HTML 파일에서는 커스텀 태그만 선언하고, TS 컴포넌트가 실제 DOM 구조를 채우는 예제다."
      >
        <bp-form-field
          label="이메일"
          hint="기획 검토용이라 실제 인증 연동은 없다."
          required="true"
        >
          <input type="email" placeholder="name@company.com" />
        </bp-form-field>

        <bp-form-field label="비밀번호" required="true">
          <input type="password" placeholder="8자 이상 입력" />
        </bp-form-field>

        <div class="grid gap-3">
          <bp-wire-button label="로그인" full-width="true"></bp-wire-button>
          <bp-wire-button
            label="이메일 로그인 도움말"
            variant="secondary"
            full-width="true"
          ></bp-wire-button>
        </div>

        <bp-table-section
          title="상태 체크"
          description="기획 검토 시 같은 화면 아래에 확인 포인트를 같이 붙일 수 있다."
        >
          <table>
            <thead>
              <tr>
                <th>상태</th>
                <th>표현 규칙</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>기본</td>
                <td>이메일, 비밀번호 입력창과 주요 CTA 노출</td>
              </tr>
              <tr>
                <td>에러</td>
                <td>필수값 누락 시 각 필드 하단에 안내 문구 추가</td>
              </tr>
              <tr>
                <td>로딩</td>
                <td>로그인 버튼 비활성화 + 진행 상태 문구 표시</td>
              </tr>
            </tbody>
          </table>
        </bp-table-section>
      </bp-page-shell>
    </div>

  </body>
</html>
